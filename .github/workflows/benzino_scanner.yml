name: BENZINO Institutional Scanner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Run full master watchlist scan instead of user-watchlist fast scan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      scan_timeframes:
        description: "Timeframes to scan when full_scan=true"
        required: true
        default: "15m,1h,4h,1d"
        type: choice
        options:
          - "15m"
          - "1h"
          - "15m,1h"
          - "15m,1h,4h,1d"

concurrency:
  group: benzino-institutional-scanner
  cancel-in-progress: false

permissions:
  contents: read

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  DEFAULT_USER_TIMEFRAME: "1h"
  FULL_UNIVERSE_SCAN_EVERY_HOURS: "0"
  SCAN_MASTER_WATCHLIST_FALLBACK: "false"
  FORCE_FULL_SCAN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_scan || 'false' }}
  SCAN_ALL_TIMEFRAMES_EVERY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_scan || 'false' }}
  SCAN_TIMEFRAMES: ${{ github.event.inputs.scan_timeframes || '15m,1h,4h,1d' }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements_scanner.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_scanner.txt

      - name: Run scanner
        run: python scanner.py
