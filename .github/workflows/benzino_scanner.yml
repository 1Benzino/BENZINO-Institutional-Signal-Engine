name: BENZINO Institutional Scanner

on:
  schedule:
    # Runs every 15 minutes, 24/7.
    # GitHub cron is UTC. The scanner decides which timeframe(s) to scan per run.
    - cron: "2,17,32,47 * * * *"

  workflow_dispatch:
    inputs:
      full_scan:
        description: "Run full master watchlist scan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      scan_timeframes:
        description: "Timeframes to scan on manual runs"
        required: true
        default: "15m"
        type: choice
        options:
          - "15m"
          - "1h"
          - "4h"
          - "1d"
          - "15m,1h,4h,1d"

concurrency:
  group: benzino-institutional-scanner
  cancel-in-progress: false

permissions:
  contents: read

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

  DEFAULT_USER_TIMEFRAME: "1h"
  FULL_UNIVERSE_SCAN_EVERY_HOURS: "0"
  SCAN_MASTER_WATCHLIST_FALLBACK: "true"

  FORCE_FULL_SCAN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_scan || 'false' }}
  SCAN_ALL_TIMEFRAMES_EVERY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_scan || 'false' }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Decide scan timeframes
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date -u

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SCAN_TF="${{ github.event.inputs.scan_timeframes }}"
            SCHEDULE_LABEL="manual"
          else
            # Scheduled runs happen every 15 minutes at UTC minutes 02, 17, 32, 47.
            # 15m scans run every scheduled run.
            # 1h scans are added at minute 17 once per hour.
            # 4h scans are added at minute 17 every 4 UTC hours.
            # 1d scans are added at 00:47 UTC once daily.
            MINUTE="$(date -u +%M)"
            HOUR="$(date -u +%H)"

            SCAN_TF="15m"

            if [ "$MINUTE" = "17" ]; then
              SCAN_TF="${SCAN_TF},1h"

              if [ $((10#$HOUR % 4)) -eq 0 ]; then
                SCAN_TF="${SCAN_TF},4h"
              fi
            fi

            if [ "$MINUTE" = "47" ] && [ "$HOUR" = "00" ]; then
              SCAN_TF="${SCAN_TF},1d"
            fi

            SCHEDULE_LABEL="every_15m_dynamic"
          fi

          echo "SCAN_TIMEFRAMES=$SCAN_TF" >> "$GITHUB_ENV"
          echo "SCHEDULE_CRON=$SCHEDULE_LABEL" >> "$GITHUB_ENV"

          echo "Resolved SCAN_TIMEFRAMES=$SCAN_TF"
          echo "Resolved SCHEDULE_CRON=$SCHEDULE_LABEL"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements_scanner.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_scanner.txt

      - name: Run scanner
        run: python scanner.py
